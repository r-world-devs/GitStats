title: GitStats
url: https://r-world-devs.github.io/GitStats/
template:
  bootstrap: 5
reference:
- title: Create, set and show
- contents:
  - create_gitstats
  - set_github_host
  - set_gitlab_host
  - matches("verbose")
  - show_orgs
  - show_hosts
- title: Get git data
  desc: >
      Functions to get git data in a tibble format.
  contents:
  - get_orgs
  - get_repos
  - get_repos_urls
  - get_repos_trees
  - get_commits
  - get_issues
  - get_pull_requests
  - get_release_logs
  - get_files
  - get_users
- title: Storage
- contents:
  - set_local_storage
  - set_postgres_storage
  - set_sqlite_storage
  - get_storage
  - get_storage_metadata
  - remove_from_storage
- title: Parallel processing
- contents:
  - set_parallel
- title: Get statistics
  desc: >
      Functions summarizing git data.
- contents:
  - get_commits_stats
  - get_issues_stats
  - get_pull_requests_stats
articles:
- title: Articles
  navbar: ~
  contents:
  - set_hosts
  - store_data
